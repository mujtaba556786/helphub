termsResponsibilityDesc=Sie interagieren mit anderen Nutzern auf eigenes Risiko. Sie sind allein verantwortlich für Ihre Entscheidungen, Vereinbarungen und Ihr Verhalten auf der Plattform.
termsSafetyTitle=Sicherheitswerkzeuge
termsSafetyDesc=Wir stellen Sperr-, Melde- und Moderationswerkzeuge zur Verfügung. HelpMate haftet jedoch nicht für Ergebnisse aus Peer-Interaktionen oder Nutzervereinbarungen.
termsGuidelinesTitle=Community-Richtlinien
termsGuidelinesDesc=Sie verpflichten sich, alle Mitglieder mit Respekt zu behandeln. Belästigung, Betrug, Spam oder Missbrauch führen zur Sperrung oder dauerhaften Deaktivierung des Kontos.
termsEligibilityTitle=Berechtigung
termsEligibilityDesc=Mit der Nutzung dieser Plattform bestätigen Sie, dass Sie das Mindestalter in Ihrer Region erfüllen.
