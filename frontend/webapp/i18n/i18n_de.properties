# Terms Acceptance Dialog
termsTitle=Community-Sicherheitsvereinbarung
termsWelcome=Willkommen bei HelpMate
termsIntro=Bevor Sie fortfahren, lesen und akzeptieren Sie bitte unsere Community-Bedingungen:
termsPeerTitle=Peer-to-Peer-Plattform
termsPeerDesc=HelpMate verbindet Nachbarn direkt. Die Plattform ist ein neutraler Vermittler — sie erbringt keine Leistungen, gibt keine Garantien und kontrolliert keine Dienste.
