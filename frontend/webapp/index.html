<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>HelpHub</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
    </style>
    <script
        id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="maicatch"
        data-sap-ui-theme-roots='{
            "maicatch": "./themes/"
        }'
        data-sap-ui-resource-roots='{
            "helphub": ""
        }'
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-frame-options="trusted"
    ></script>

    <!-- ── Leaflet Maps (OpenStreetMap, no API key needed) ── -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- ── Google Identity Services ── -->
    <!-- Replace YOUR_GOOGLE_CLIENT_ID with the value from Google Cloud Console -->
    <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- ── Facebook SDK ── -->
    <!-- Replace YOUR_FACEBOOK_APP_ID with the value from developers.facebook.com -->
    <script>
        window.fbAsyncInit = function () {
            FB.init({
                appId: 'YOUR_FACEBOOK_APP_ID',
                cookie: true,
                xfbml: true,
                version: 'v19.0'
            });
        };
    </script>
    <script async defer crossorigin="anonymous"
        src="https://connect.facebook.net/en_US/sdk.js"></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div
        data-sap-ui-component
        data-name="helphub"
        data-id="container"
        data-settings='{"id" : "helphub"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
