<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Content Security Policy — allows SAP UI5 CDN + Leaflet CDN + backend API -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob: 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://ui5.sap.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://ui5.sap.com data: blob:; connect-src 'self' https: http: blob: data:; img-src 'self' data: blob: https: http:; font-src 'self' data: blob: https://ui5.sap.com;">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HelpMate</title>

    <meta name="application-name" content="HelpMate">
    <meta name="description" content="Get everyday tasks done by trusted neighbors.">

    <!-- iOS Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HelpMate">

    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
    </style>

    <!-- App stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=2.15">

    <!-- ── Cordova bridge — MUST be first script ── -->
    <script src="cordova.js"></script>

    <!-- Cache-bust helphub app JS/XML/i18n files -->
    <script>
        (function () {
            var _HH_BUILD = '2.42';
            var _desc = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
            Object.defineProperty(HTMLScriptElement.prototype, 'src', {
                get: _desc.get,
                set: function (val) {
                    if (typeof val === 'string' && val.indexOf('?') === -1 &&
                        (val.indexOf('/controller/') !== -1 ||
                         val.indexOf('/model/')      !== -1 ||
                         val.indexOf('Component.js') !== -1)) {
                        val = val + '?v=' + _HH_BUILD;
                    }
                    _desc.set.call(this, val);
                },
                configurable: true
            });

            var _HH_RE = /\/(controller|model|view|fragments|Base|i18n)\//;
            var _origOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function (method, url) {
                if (typeof url === 'string' && url.indexOf('?') === -1 &&
                    (_HH_RE.test(url) || url.indexOf('Component.js') !== -1)) {
                    url = url + '?v=' + _HH_BUILD;
                }
                return _origOpen.apply(this, arguments);
            };
            var _origFetch = window.fetch;
            window.fetch = function (input, init) {
                if (typeof input === 'string' && input.indexOf('?') === -1 &&
                    (_HH_RE.test(input) || input.indexOf('Component.js') !== -1)) {
                    input = input + '?v=' + _HH_BUILD;
                }
                return _origFetch.call(this, input, init);
            };
        })();
    </script>

    <!-- Apply saved language before UI5 boots -->
    <script>
        window['sap-ui-config'] = {
            language: localStorage.getItem('helpmate_lang') || ''
        };
    </script>

    <!-- ── SAP UI5 bootstrap ──
         Always load from CDN in the APK — the local sap-ui-core.js is only
         a 1.6 KB stub that uses document.write(), which is unreliable in
         Cordova WebView. CDN version is the full self-contained bundle.
         frame-options="allow" — "trusted" causes UI5 to blank the page
         because http://localhost is not in its trusted-origins whitelist. -->
    <script>
        (function () {
            var src = 'https://ui5.sap.com/1.120/resources/sap-ui-core.js';
            var s = document.createElement('script');
            s.id = 'sap-ui-bootstrap';
            s.setAttribute('data-sap-ui-theme', 'helpmate');
            s.setAttribute('data-sap-ui-theme-roots', '{"helpmate":"./themes/"}');
            s.setAttribute('data-sap-ui-resource-roots', '{"helphub":""}');
            s.setAttribute('data-sap-ui-on-init', 'module:sap/ui/core/ComponentSupport');
            s.setAttribute('data-sap-ui-compat-version', 'edge');
            s.setAttribute('data-sap-ui-async', 'true');
            s.setAttribute('data-sap-ui-frame-options', 'allow');
            s.src = src;
            document.head.appendChild(s);
        })();
    </script>

    <!-- ── Leaflet Maps ── -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
    <div
        data-sap-ui-component
        data-name="helphub"
        data-id="container"
        data-settings='{"id" : "helphub"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
